<!DOCTYPE html>
<html>
<head>
<title>Chef Kuldip AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Background */

body{
height:100vh;
margin:0;
font-family:'Segoe UI', sans-serif;

background-image:url("https://images.unsplash.com/photo-1556911220-bff31c812dba");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

/* Glass container */

.app{
width:850px;
height:85vh;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);

border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);

display:flex;
flex-direction:column;
overflow:hidden;
}

/* Header */

.header{
background:rgba(0,0,0,0.5);
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

/* Chat */

.chat{
flex:1;
overflow-y:auto;
padding:25px;
}

/* Messages */

.message{
margin-bottom:18px;
display:flex;
}

.message.user{
justify-content:flex-end;
}

.bubble{
padding:12px 16px;
border-radius:14px;
max-width:65%;
font-size:15px;
}

/* Chef message */

.assistant .bubble{
background:rgba(255,255,255,0.9);
}

/* User */

.user .bubble{
background:#ff7043;
color:white;
}

/* Input */

.input-area{
padding:15px;
background:rgba(0,0,0,0.5);
}

form{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

button{
background:#ff7043;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
}

button:hover{
background:#e64a19;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
👨‍🍳 Chef  – AI Kitchen  
<div style="font-size:13px; opacity:0.8;">AI Cooking Assistant • Built by Kuldip</div>
</div>

<div class="chat" id="chat">

{% for msg in messages %}

<div class="message {{msg.role}}">
<div class="bubble">
{{msg.content}}
</div>
</div>

{% endfor %}

</div>

<div class="input-area">

<form action="/chat" method="post">

<input type="text" name="message" placeholder="Ask Chef what to cook..." required>

<button>Cook 🍳</button>

</form>

</div>

</div>

<script>
var chat=document.getElementById("chat");
chat.scrollTop=chat.scrollHeight;
</script>

</body>
</html>
